  <img src="../image/stereographic-projection-1.jpeg" width="40%"><img src="../image/stereographic-projection-2.jpeg" width="50%">
  <p>使用二次型反演 <span><math><mrow><mrow><mo>|</mo><mi>𝑥</mi><mo>|</mo></mrow><mfrac><mi>𝑥</mi><mrow><mo>|</mo><mi>𝑥</mi><mo>|</mo></mrow></mfrac><mo>⇝</mo><mfrac><mn>1</mn><mrow><mo>|</mo><mi>𝑥</mi><mo>|</mo></mrow></mfrac><mfrac><mi>𝑥</mi><mrow><mo>|</mo><mi>𝑥</mi><mo>|</mo></mrow></mfrac></mrow></math></span>. 共形变换的一种</p>
  <p><span><math><msup><mi mathvariant="normal">𝕊</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></math></span> 南北极球极投影坐标. <span><math><mtable><mtr><mtd><msup><mi mathvariant="normal">𝕊</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd><mtd><mo>⟶</mo></mtd><mtd><msup><mi mathvariant="normal">ℝ</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd></mtr><mtr><mtd><mi>𝑥</mi></mtd><mtd><mo>⟿</mo></mtd><mtd><mi>𝜉</mi></mtd></mtr></mtable></math></span>. <span><math><mrow><mi>𝑁</mi><mtext> or </mtext><mi>𝑆</mi><mo>=</mo><mi>𝑝</mi><mo>=</mo><mrow><mo>(</mo><mrow><mo>∓</mo><mrow><mn>1</mn><mo>,</mo></mrow><mn>0</mn></mrow><mo>)</mo></mrow></mrow></math></span>, 共线 <span><math><mrow><mfrac><mrow><mi>𝑝</mi><mo>−</mo><mi>𝑥</mi></mrow><mrow><mi>𝑝</mi><mo>−</mo><mrow><mo>(</mo><mrow><mn>0</mn><mo>,</mo><mi>𝜉</mi></mrow><mo>)</mo></mrow></mrow></mfrac><mo>=</mo><mi>𝜆</mi></mrow></math></span>, 解给出映射</p>
  <math display="block"><mtable><mtr><mtd><msup><mi mathvariant="normal">𝕊</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd><mtd><mo>⟶</mo></mtd><mtd><msup><mi mathvariant="normal">ℝ</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd></mtr><mtr><mtd><mrow><mo>(</mo><mrow><msub><mi>𝑥</mi><mn>1</mn></msub><mrow><mo>,</mo><mo>…</mo><mo>,</mo></mrow><msub><mi>𝑥</mi><mi>𝑛</mi></msub></mrow><mo>)</mo></mrow></mtd><mtd><mo>⟿</mo></mtd><mtd><mfrac><mrow><msub><mi>𝑥</mi><mn>2</mn></msub><mrow><mo>,</mo><mo>…</mo><mo>,</mo></mrow><msub><mi>𝑥</mi><mi>𝑛</mi></msub></mrow><mrow><mn>1</mn><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow></mfrac></mtd></mtr></mtable></math>
  <p><span><math><mrow><mrow><mo>|</mo><mi>𝜉</mi><msup><mo>|</mo><mn>2</mn></msup></mrow><mo>=</mo><mfrac><mrow><mrow><mo>|</mo><msub><mi>𝑥</mi><mn>2</mn></msub></mrow><mrow><mo>,</mo><mo>…</mo><mo>,</mo></mrow><mrow><msub><mi>𝑥</mi><mi>𝑛</mi></msub><msup><mo>|</mo><mn>2</mn></msup></mrow></mrow><msup><mrow><mo>(</mo><mrow><mn>1</mn><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow><mo>)</mo></mrow><mn>2</mn></msup></mfrac><mo>=</mo><mfrac><mrow><mn>1</mn><mo>−</mo><msubsup><mi>𝑥</mi><mn>1</mn><mn>2</mn></msubsup></mrow><msup><mrow><mo>(</mo><mrow><mn>1</mn><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow><mo>)</mo></mrow><mn>2</mn></msup></mfrac></mrow></math></span></p>
  <p><span><math><mrow><mn>1</mn><mo>+</mo><mrow><mo>|</mo><mi>𝜉</mi><msup><mo>|</mo><mn>2</mn></msup></mrow><mo>=</mo><mn>2</mn><mfrac><mrow><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow><msup><mrow><mo>(</mo><mrow><mn>1</mn><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow><mo>)</mo></mrow><mn>2</mn></msup></mfrac></mrow></math></span></p>
  <math display="block"><mtable><mtr><mtd><msup><mi mathvariant="normal">ℝ</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd><mtd><mo>⟶</mo></mtd><mtd><msup><mi mathvariant="normal">𝕊</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd></mtr><mtr><mtd><mi>𝜉</mi></mtd><mtd><mo>⟿</mo></mtd><mtd><mfrac><mrow><mo>±</mo><mrow><mo>(</mo><mrow><mn>1</mn><mo>−</mo><mrow><mo>|</mo><mi>𝜉</mi><msup><mo>|</mo><mn>2</mn></msup></mrow></mrow><mo>)</mo></mrow><mo>,</mo><mi>𝜉</mi></mrow><mrow><mn>1</mn><mo>+</mo><mrow><mo>|</mo><mi>𝜉</mi><msup><mo>|</mo><mn>2</mn></msup></mrow></mrow></mfrac></mtd></mtr></mtable></math>
  <p>transition-function 是二次型反演</p>
  <math display="block"><mtable><mtr><mtd><msup><mi mathvariant="normal">ℝ</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd><mtd><mo>⟶</mo></mtd><mtd><msup><mi mathvariant="normal">ℝ</mi><mrow><mi>𝑛</mi><mo>−</mo><mn>1</mn></mrow></msup></mtd></mtr><mtr><mtd><mi>𝜉</mi></mtd><mtd><mo>⟿</mo></mtd><mtd><mrow><mfrac><mrow><mn>1</mn><mo>±</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow><mrow><mn>1</mn><mo>∓</mo><msub><mi>𝑥</mi><mn>1</mn></msub></mrow></mfrac><mi>𝜉</mi><mo>=</mo><mfrac><mi>𝜉</mi><mrow><mo>|</mo><mi>𝜉</mi><msup><mo>|</mo><mn>2</mn></msup></mrow></mfrac></mrow></mtd></mtr></mtable></math>
</div>
